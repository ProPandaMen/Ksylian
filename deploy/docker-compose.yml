services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ksylian-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KSYLIAN_AGENT_URL: "${KSYLIAN_AGENT_URL:-}"
      KSYLIAN_AGENT_TOKEN: "${KSYLIAN_AGENT_TOKEN:-}"
    ports:
      - "${KSYLIAN_BACKEND_PORT:-8090}:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ksylian-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${KSYLIAN_FRONTEND_PORT:-8088}:80"
