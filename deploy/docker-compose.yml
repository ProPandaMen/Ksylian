services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ksylian-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KSYLIAN_AGENT_URL: "${KSYLIAN_AGENT_URL:-}"
      KSYLIAN_AGENT_TOKEN: "${KSYLIAN_AGENT_TOKEN:-}"
      KSYLIAN_SETTINGS_PATH: "${KSYLIAN_SETTINGS_PATH:-/data/settings.json}"
      KSYLIAN_BUILD_VERSION: "${KSYLIAN_BUILD_VERSION:-dev}"
      KSYLIAN_BUILD_SHA: "${KSYLIAN_BUILD_SHA:-local}"
      KSYLIAN_RELEASE_REPOSITORY: "${KSYLIAN_RELEASE_REPOSITORY:-ProPandaMen/Ksylian}"
      KSYLIAN_GITHUB_TOKEN: "${KSYLIAN_GITHUB_TOKEN:-}"
      CURSEFORGE_API_KEY: "${CURSEFORGE_API_KEY:-}"
    volumes:
      - ksylian-backend-data:/data
    ports:
      - "${KSYLIAN_BACKEND_PORT:-8090}:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_VERSION: "${KSYLIAN_BUILD_VERSION:-0.1.0}"
        VITE_BUILD_SHA: "${KSYLIAN_BUILD_SHA:-local}"
    container_name: ksylian-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${KSYLIAN_FRONTEND_PORT:-8088}:80"

volumes:
  ksylian-backend-data:
